name: Publish images

# Publishes container images to GitHub Container Registry (ghcr.io) on pushes
# to main and version tags. Optional — delete this file if you deploy only via
# Render/Vercel. For the frontend image, set a repo variable VITE_SERVER_URL
# (Settings -> Secrets and variables -> Actions -> Variables) to your API URL.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.app }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_SERVER_URL=${{ vars.VITE_SERVER_URL }}
